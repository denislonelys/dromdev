# ============================================================================
# IIStudio — Nginx Virtual Host
# ============================================================================

# HTTP → HTTPS редирект
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name _;

    # ── SSL сертификаты ───────────────────────────────────────────────────────
    # Для Let's Encrypt: certbot certonly --nginx -d yourdomain.com
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Если нет SSL сертификата — самоподписанный:
    # openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #   -keyout docker/nginx/ssl/privkey.pem \
    #   -out docker/nginx/ssl/fullchain.pem \
    #   -subj "/CN=iistudio"

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Заголовки безопасности ─────────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Health check (без auth и rate limit) ──────────────────────────────
    location /health {
        proxy_pass http://iistudio_api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── API с rate limiting ────────────────────────────────────────────────
    location /api/v1/chat {
        limit_req zone=chat_limit burst=10 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://iistudio_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Таймауты для долгих AI запросов
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # ── SSE стриминг (без буферизации) ────────────────────────────────────
    location /api/v1/chat/stream {
        limit_req zone=chat_limit burst=5 nodelay;

        proxy_pass http://iistudio_api;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Отключить буферизацию для SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;

        # SSE заголовки
        add_header Cache-Control 'no-cache';
        add_header Content-Type 'text/event-stream';
    }

    # ── Остальные API эндпоинты ────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://iistudio_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Swagger документация ───────────────────────────────────────────────
    location /docs {
        proxy_pass http://iistudio_api/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://iistudio_api/openapi.json;
        proxy_set_header Host $host;
    }

    # ── 404 fallback ──────────────────────────────────────────────────────
    location / {
        return 404 '{"error": "Not found", "docs": "/docs"}';
        add_header Content-Type application/json;
    }
}
