# ============================================================================
# IIStudio — Nginx конфиг (HTTP на 80, статика + API + файловый браузер)
# ============================================================================

server {
    listen 8888;
    server_name _;

    # ── Кодировка ─────────────────────────────────────────────────────────────
    charset utf-8;

    # ── Логи ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/iistudio_access.log;
    error_log  /var/log/nginx/iistudio_error.log;

    # ── Таймауты для AI запросов ──────────────────────────────────────────────
    proxy_read_timeout 300s;
    proxy_connect_timeout 15s;
    proxy_send_timeout 300s;

    # ── Статика (CSS, JS, изображения) ───────────────────────────────────────
    location /static/ {
        alias /root/IIStudio/web/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── SSE стриминг (без буферизации) ───────────────────────────────────────
    location /api/chat/stream {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        add_header Cache-Control 'no-cache';
        add_header X-Accel-Buffering no;
    }

    # ── API ──────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Swagger docs ─────────────────────────────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
    }

    # ── Файловый браузер: /files/ → папки пользователя ───────────────────────
    # Показывает содержимое папок автоматически (видео, файлы, etc.)
    location /files/ {
        alias /root/IIStudio/userfiles/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        autoindex_format html;
        charset utf-8;

        # Разрешаем скачивание видео и файлов
        types {
            video/mp4                         mp4;
            video/webm                        webm;
            video/x-msvideo                   avi;
            video/quicktime                   mov;
            video/x-matroska                  mkv;
            audio/mpeg                        mp3;
            audio/ogg                         ogg;
            image/jpeg                        jpg jpeg;
            image/png                         png;
            image/gif                         gif;
            image/webp                        webp;
            application/pdf                   pdf;
            application/zip                   zip;
            application/x-tar                 tar;
            application/gzip                  gz;
            text/plain                        txt md;
            application/json                  json;
        }

        add_header Accept-Ranges bytes;
        add_header X-Content-Type-Options nosniff;
    }

    # ── Главная страница (веб-интерфейс IIStudio) ────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
