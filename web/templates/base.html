<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}IIStudio{% endblock %}</title>
  <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">IIStudio</span>
      <span class="brand-version">v{{ version }}</span>
    </a>
    <div class="navbar-links">
      <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Чат</a>
      <a href="/pricing" class="nav-link {% if request.url.path == '/pricing' %}active{% endif %}">Цены</a>
      <a href="/install" class="nav-link {% if request.url.path == '/install' %}active{% endif %}">Установка</a>
      <a href="/files/" class="nav-link">Файлы</a>
      <a href="/docs" class="nav-link" target="_blank">API</a>
    </div>
    <div class="navbar-status" style="gap:.75rem">
      <span class="status-dot" id="statusDot"></span>
    <script>document.getElementById('statusDot').className='status-dot '+(typeof browser_running!=='undefined'&&browser_running?'online':'offline');</script>
      <a href="/dashboard" id="navUser" class="nav-link" style="display:none">👤 Кабинет</a>
      <a href="/login" id="navLogin" class="btn btn-outline btn-sm">Войти</a>
    </div>
    <script>
      if(localStorage.getItem('iis_token')) {
        document.getElementById('navUser').style.display='block';
        document.getElementById('navLogin').style.display='none';
      }
    </script>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/main.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
