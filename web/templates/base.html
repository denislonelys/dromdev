<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}IIStudio{% endblock %}</title>
  <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">IIStudio</span>
      <span class="brand-version">v{{ version }}</span>
    </a>
    <div class="navbar-links">
      <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Чат</a>
      <a href="/models" class="nav-link {% if request.url.path == '/models' %}active{% endif %}">Модели</a>
      <a href="/status" class="nav-link {% if request.url.path == '/status' %}active{% endif %}">Статус</a>
      <a href="/docs" class="nav-link" target="_blank">API</a>
    </div>
    <div class="navbar-status">
      <span class="status-dot {% if status.browser_running %}online{% else %}offline{% endif %}"></span>
      <span class="status-text">{{ status.mode | upper }}</span>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/main.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
